let raceScore, raceRound, raceTimeLeft, raceCorrect;

function initQuizRace() { raceScore = 0; raceRound = 0; nextRace(); }

function nextRace() {
  if (raceRound >= 10) {
    const stars = raceScore >= 25 ? '⭐⭐⭐' : raceScore >= 15 ? '⭐⭐' : '⭐';
    document.getElementById('quizraceMode').innerHTML = `<div class="game-card" style="text-align:center">
      <div class="stars">${stars}</div><div class="game-title">Race Complete!</div>
      <div style="font-size:1.2rem;margin:8px 0">Score: <strong>${raceScore}</strong> points</div>
      <button class="ctrl-btn btn-next" style="margin-top:12px" onclick="initQuizRace()">Play Again</button>
    </div>`; return;
  }
  raceRound++;
  const words = activeWords;
  raceCorrect = words[Math.floor(Math.random() * words.length)];
  let opts = [raceCorrect];
  while (opts.length < 4) { const r = words[Math.floor(Math.random() * words.length)]; if (!opts.includes(r)) opts.push(r); }
  shuffleArray(opts);
  raceTimeLeft = 800; // 8 seconds in tenths
  clearInterval(_raceTimer);

  document.getElementById('quizraceMode').innerHTML = `<div class="game-card" style="text-align:center">
    <div class="game-title">🏁 Quiz Race</div>
    <div style="color:#666;font-size:.82rem;margin-bottom:6px">Round ${raceRound}/10 | Score: ${raceScore}</div>
    <div class="race-bar"><div class="race-fill" id="raceFill" style="width:100%"></div></div>
    <div style="font-family:'Fredoka One';font-size:1.2rem;color:#003893;margin:10px 0">${raceCorrect.es}</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${opts.map(o => `<button class="quiz-opt" style="text-align:center" onclick="raceAnswer(this,${o === raceCorrect})">${o.en}</button>`).join('')}
    </div>
    <div id="raceFb" style="margin-top:8px;font-weight:700"></div>
  </div>`;

  _raceTimer = addInterval(() => {
    raceTimeLeft -= 5;
    const fill = document.getElementById('raceFill');
    if (fill) {
      fill.style.width = (raceTimeLeft / 800 * 100) + '%';
      fill.classList.toggle('low', raceTimeLeft < 200);
    }
    if (raceTimeLeft <= 0) {
      clearInterval(_raceTimer);
      streak = 0; updateStats();
      const fb = document.getElementById('raceFb');
      if (fb) fb.innerHTML = `<span style="color:#CE1126">⏱ Time's up! Answer: ${raceCorrect.en}</span>`;
      setTimeout(() => { if (mode === 'quizrace') nextRace(); }, 1500);
    }
  }, 50);
}

function raceAnswer(btn, isCorrect) {
  clearInterval(_raceTimer);
  const fb = document.getElementById('raceFb');
  if (fb.textContent) return;
  if (isCorrect) {
    const bonus = Math.ceil(raceTimeLeft / 100); // 1-8 points based on speed
    raceScore += bonus; streak++; updateStats();
    btn.classList.add('correct');
    fb.innerHTML = `<span style="color:#1E8449">✅ +${bonus} points!</span>`;
  } else {
    streak = 0; updateStats();
    btn.classList.add('wrong');
    fb.innerHTML = `<span style="color:#CE1126">❌ Answer: ${raceCorrect.en}</span>`;
  }
  setTimeout(() => { if (mode === 'quizrace') nextRace(); }, 1500);
}

// ═══════════════════════════════════════════════
let bossHP, playerHP, bossRound, bossWord;

function initBoss() {
  bossHP = 5; playerHP = 3; bossRound = 0;
  nextBossRound();
}

function nextBossRound() {
  if (bossHP <= 0) { bossVictory(); return; }
  if (playerHP <= 0) { bossDefeat(); return; }
  bossRound++;
  const words = activeWords;
  bossWord = words[Math.floor(Math.random() * words.length)];
  let opts = [bossWord];
  while (opts.length < 4) { const r = words[Math.floor(Math.random() * words.length)]; if (!opts.includes(r)) opts.push(r); }
  shuffleArray(opts);

  document.getElementById('bossMode').innerHTML = `<div class="game-card" style="text-align:center">
    <div class="game-title">👾 Boss Battle!</div>
    <div class="boss-char" id="bossChar">🦜</div>
    <div style="margin:8px 0">
      <div style="font-size:.75rem;font-weight:700;color:#CE1126">Boss HP</div>
      <div class="hp-bar"><div class="hp-fill hp-boss" style="width:${bossHP * 20}%"></div></div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:.75rem;font-weight:700;color:#1E8449">Your HP</div>
      <div class="hp-bar"><div class="hp-fill hp-player" style="width:${playerHP * 33.3}%"></div></div>
    </div>
    <div style="font-family:'Fredoka One';font-size:1.1rem;color:#003893;margin:10px 0">${bossWord.es}</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${opts.map(o => `<button class="quiz-opt" style="text-align:center" onclick="bossAnswer(this,${o === bossWord})">${o.en}</button>`).join('')}
    </div>
  </div>`;
}

function bossAnswer(btn, isCorrect) {
  if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
  if (isCorrect) {
    btn.classList.add('correct'); bossHP--;
    showToast('💥 Hit! Boss takes damage!', 1000);
  } else {
    btn.classList.add('wrong'); playerHP--;
    const boss = document.getElementById('bossChar');
    if (boss) { boss.classList.add('boss-attack-anim'); setTimeout(() => boss.classList.remove('boss-attack-anim'), 600); }
    showToast('🦜 Boss attacks!', 1000);
  }
  _bossTimer = setTimeout(nextBossRound, 1200);
}

function bossVictory() {
  document.getElementById('bossMode').innerHTML = `<div class="game-card" style="text-align:center">
    <div style="font-size:3rem">🏆</div>
    <div class="game-title" style="color:#1E8449">¡Victoria!</div>
    <div style="font-size:1.1rem;margin:8px 0">You defeated the boss!</div>
    <button class="ctrl-btn btn-next" style="margin-top:12px" onclick="initBoss()">Battle Again</button>
  </div>`;
  spawnConfetti();
}

function bossDefeat() {
  document.getElementById('bossMode').innerHTML = `<div class="game-card" style="text-align:center">
    <div style="font-size:3rem">💀</div>
    <div class="game-title" style="color:#CE1126">Defeated!</div>
    <div style="font-size:1.1rem;margin:8px 0">The boss won this time…</div>
    <button class="ctrl-btn btn-next" style="margin-top:12px" onclick="initBoss()">Try Again</button>
  </div>`;
}

function spawnConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  const colors = ['#FCD116', '#003893', '#CE1126', '#1E8449', '#8E44AD', '#D4AC0D'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.style.cssText = `position:absolute;width:${6 + Math.random() * 8}px;height:${6 + Math.random() * 8}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${Math.random() * 100}%;top:-10px;border-radius:${Math.random() > .5 ? '50%' : '2px'};
      animation:confetti-fall ${2 + Math.random() * 2}s ease-in ${Math.random() * .5}s forwards`;
    wrap.appendChild(piece);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 5000);
}

// 23. DIALOGUE JUMBLE
// ═══════════════════════════════════════════════
const DIALOGUES_SP1 = [
  { title: "En el café", lines: [
    "Ana: ¡Hola! ¿Cómo estás?",
    "Carlos: Estoy bien, gracias. ¿Y tú?",
    "Ana: Muy bien. ¿Te gusta el café colombiano?",
    "Carlos: ¡Sí! Me encanta. Es muy famoso.",
    "Ana: Vamos al café cerca de aquí.",
    "Carlos: ¡Buena idea! Vamos."
  ]},
  { title: "En la ciudad", lines: [
    "María: ¿Dónde está el parque?",
    "Pedro: Está al lado del centro comercial.",
    "María: ¿Está lejos de aquí?",
    "Pedro: No, está cerca. Vamos a correr allí.",
    "María: ¡Me gusta correr! Vamos."
  ]},
  { title: "La clase de español", lines: [
    "Profe: ¿Qué les gusta de Colombia?",
    "Luis: Me gusta la cumbia. Es bonita.",
    "Sara: A mí me gustan las arepas.",
    "Profe: ¡Excelente! Colombia es un país famoso.",
    "Luis: Yo quiero ir a Bogotá."
  ]}
];
let dialCorrect, dialOrder, dialSelected;

function initDialogue() {
  const d = DIALOGUES_SP1[Math.floor(Math.random() * DIALOGUES_SP1.length)];
  dialCorrect = [...d.lines];
  dialOrder = shuffleArray([...d.lines]);
  dialSelected = null;
  renderDialogue(d.title);
}

function renderDialogue(title) {
  const el = document.getElementById('dialogueMode');
  el.innerHTML = `<div class="game-card">
    <div class="game-title">🗣️ Dialogue Jumble: ${title || ''}</div>
    <p class="game-subtitle">Click two lines to swap them into the correct order</p>
    <div id="dialLines">${dialOrder.map((line, i) =>
      `<div class="dial-line${dialSelected === i ? ' dial-selected' : ''}" onclick="dialTap(${i})">${line}</div>`
    ).join('')}</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap">
      <button class="ctrl-btn btn-know" onclick="dialCheck()">✅ Check</button>
      <button class="ctrl-btn btn-next" onclick="initDialogue()">🔄 New</button>
    </div>
  </div>`;
}

function dialTap(idx) {
  if (dialSelected === null) {
    dialSelected = idx;
  } else {
    // Swap
    [dialOrder[dialSelected], dialOrder[idx]] = [dialOrder[idx], dialOrder[dialSelected]];
    dialSelected = null;
  }
  renderDialogue();
}

function dialCheck() {
  const lines = document.querySelectorAll('#dialLines .dial-line');
  let allCorrect = true;
  dialOrder.forEach((line, i) => {
    if (line === dialCorrect[i]) lines[i].classList.add('dial-correct');
    else { lines[i].classList.add('dial-wrong'); allCorrect = false; }
  });
  if (allCorrect) {
    streak += dialCorrect.length; updateStats();
    showToast('🎉 ¡Perfecto!', 2000);
  }
}
