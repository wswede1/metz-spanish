<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson — Colombia Unit</title>
<link rel="stylesheet" href="lesson-engine.css">
</head>
<body>
<div id="lessonRoot"></div>
<script src="lesson-engine.js"></script>
<script>
// Load lesson data from query param: ?day=1
(function() {
  var params = new URLSearchParams(window.location.search);
  var day = params.get('day') || '1';
  var script = document.createElement('script');
  script.src = 'sp1-day' + day.padStart(2, '0') + '.js';
  script.onload = function() {
    if (window.LESSON_DATA && window.LessonEngine) {
      document.title = window.LESSON_DATA.title + ' — Colombia Unit';
      window.LessonEngine.render(window.LESSON_DATA);
    }
  };
  document.body.appendChild(script);
})();
</script>
</body>
</html>
