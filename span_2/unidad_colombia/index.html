<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=student_site/index.html">
  <title>Spanish 2 Colombia Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Fredoka+One&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fcd116 0%, #003893 52%, #ce1126 100%);
      color: #fff;
    }
    .card {
      width: min(640px, 100%);
      background: rgba(255,255,255,0.95);
      color: #243443;
      border-radius: 24px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 18px 48px rgba(0,0,0,0.18);
    }
    h1 {
      margin: 0 0 10px;
      font-family: 'Fredoka One', cursive;
      color: #003893;
    }
    p { line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #003893;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Spanish 2 Colombia Student Site</h1>
    <p>This unit now uses the upgraded student-safe hub in the <code>student_site</code> folder. If you are not redirected automatically, use the button below.</p>
    <a class="btn" href="student_site/index.html">Open Student Hub</a>
  </div>
</body>
</html>
